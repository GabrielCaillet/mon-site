<!DOCTYPE html>
<html>
<head>
    <title>3D Shooting Game</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        // Create the physics engine
        var canvas = document.getElementById('renderCanvas');
        var engine = new BABYLON.Engine(canvas, true);

        var createScene = function () {
            var scene = new BABYLON.Scene(engine);
            var camera = new BABYLON.ArcRotateCamera('camera1', Math.PI / 2, Math.PI / 3, 10, new BABYLON.Vector3(0, 0, 0), scene);
            camera.attachControl(canvas, true);
            var light = new BABYLON.HemisphericLight('light1', new BABYLON.Vector3(1, 1, 0), scene);
            var ground = BABYLON.MeshBuilder.CreateGround('ground', { width: 10, height: 10 }, scene);

            // Shooting Game Logic
            var bullets = [];
            scene.onPointerDown = function (evt) {
                var bullet = new BABYLON.MeshBuilder.CreateSphere('bullet', { diameter: 0.1 }, scene);
                bullet.position = camera.position.clone();
                bullet.moveDirection = camera.getDirection(BABYLON.Axis.Z);
                bullets.push(bullet);

                // Animate bullet
                var animation = new BABYLON.Animation('bulletAnim', 'position', 30, BABYLON.Animation.ANIMATIONTYPE_VECTOR3, BABYLON.Animation.ANIMATIONLOOPMODE_CYCLE);
                var keyFrames = [];
                keyFrames.push({ frame: 0, value: bullet.position });
                keyFrames.push({ frame: 50, value: bullet.position.add(camera.getDirection(BABYLON.Axis.Z).scale(10)) });
                animation.setKeys(keyFrames);
                bullet.animations.push(animation);
                scene.beginAnimation(bullet, 0, 50, false);
            };

            return scene;
        };

        var scene = createScene();
        engine.runRenderLoop(function () {
            scene.render();
        });
        window.addEventListener('resize', function () {
            engine.resize();
        });
    </script>
</body>
</html>
